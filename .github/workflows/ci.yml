name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle size check (eco-conception)
        run: |
          JS_SIZE=$(find dist/assets -name '*.js' -exec gzip -c {} + | wc -c)
          JS_KB=$((JS_SIZE / 1024))
          echo "JS gzip total: ${JS_KB}KB"
          if [ "$JS_KB" -gt 300 ]; then
            echo "::error::JS bundle exceeds 300KB gzip budget (${JS_KB}KB)"
            exit 1
          fi
          echo "✓ Bundle within eco-conception budget"
