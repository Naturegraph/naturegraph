<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/hermine-icon.png" />
    <link rel="apple-touch-icon" href="/hermine-icon.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO principal -->
    <title>Naturegraph — Explorez et partagez la biodiversité</title>
    <meta name="description" content="Naturegraph est l'application nature pour documenter tes sorties, partager tes observations et connecter avec une communauté de passionnés de biodiversité." />
    <meta name="keywords" content="nature, biodiversité, observations, faune, flore, communauté, application nature, naturaliste" />
    <meta name="author" content="Naturegraph" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://naturegraph.fr/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Naturegraph" />
    <meta property="og:url" content="https://naturegraph.fr/" />
    <meta property="og:title" content="Naturegraph — Explorez et partagez la biodiversité" />
    <meta property="og:description" content="Documente tes sorties nature, partage tes observations et rejoins une communauté de passionnés de biodiversité." />
    <meta property="og:image" content="https://naturegraph.fr/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@naturegraph" />
    <meta name="twitter:title" content="Naturegraph — Explorez et partagez la biodiversité" />
    <meta name="twitter:description" content="Documente tes sorties nature, partage tes observations et rejoins une communauté de passionnés de biodiversité." />
    <meta name="twitter:image" content="https://naturegraph.fr/og-preview.png" />

    <!-- Thème navigateur (barre d'adresse mobile) -->
    <meta name="theme-color" content="#006666" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Synchronous theme init — prevents FOUC / black flash
      (function(){
        var t = localStorage.getItem('naturegraph-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
